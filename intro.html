<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>北京大学学院看板移动端 - 项目介绍</title>
    <link rel="stylesheet" href="intro-styles.css">
</head>
<body>
    <!-- 顶部导航（毛玻璃） -->
    <nav class="nav">
        <div class="nav-left">
            <img src="视觉素材/20240527144201516364/北大校徽标志_红色.png" alt="北大校徽" class="nav-logo">
            <span class="nav-title">北京大学 · 学院看板移动端</span>
        </div>
    </nav>

    <!-- 主展示区（手机框为主角） -->
    <section class="showcase">
        <!-- 标题叠加层 -->
        <div class="showcase-header">
            <h1>学院看板移动端</h1>
            <p>面向二级学院院长的智能人事数据看板</p>
        </div>
        
        <!-- 巨大手机框 -->
        <div class="phone-wrapper">
            <div class="phone-glow"></div>
            <div class="phone-frame">
                <div class="phone-screen">
                    <iframe src="https://lt787100593-cell.github.io/pku-AcademicTalentProfile/" frameborder="0"></iframe>
                </div>
            </div>
        </div>

        <!-- 数据指标 -->
        <div class="showcase-stats">
            <div class="stat-item">
                <span class="stat-value">30秒</span>
                <span class="stat-label">掌握学院全貌</span>
            </div>
            <div class="stat-item">
                <span class="stat-value">4个Tab</span>
                <span class="stat-label">核心功能模块</span>
            </div>
            <div class="stat-item">
                <span class="stat-value">20+</span>
                <span class="stat-label">数据分析维度</span>
            </div>
            <div class="stat-item">
                <span class="stat-value">28个</span>
                <span class="stat-label">学院对比</span>
            </div>
        </div>
    </section>

    <!-- 功能简介（精简横向排列） -->
    <section class="features">
        <div class="container">
            <div class="features-grid">
                <div class="feature-item">
                    <div class="feature-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <rect x="3" y="3" width="7" height="7"></rect>
                            <rect x="14" y="3" width="7" height="7"></rect>
                            <rect x="14" y="14" width="7" height="7"></rect>
                            <rect x="3" y="14" width="7" height="7"></rect>
                        </svg>
                    </div>
                    <h3>总览</h3>
                    <p>核心KPI、引才质量、编制使用率、退休预测</p>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <line x1="18" y1="20" x2="18" y2="10"></line>
                            <line x1="12" y1="20" x2="12" y2="4"></line>
                            <line x1="6" y1="20" x2="6" y2="14"></line>
                        </svg>
                    </div>
                    <h3>分析</h3>
                    <p>8大分布维度、趋势分析、全校对比</p>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <circle cx="12" cy="12" r="10"></circle>
                            <line x1="12" y1="16" x2="12" y2="12"></line>
                            <line x1="12" y1="8" x2="12.01" y2="8"></line>
                        </svg>
                    </div>
                    <h3>洞察</h3>
                    <p>人才画像、学缘来源、流动指标</p>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                            <circle cx="9" cy="7" r="4"></circle>
                            <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                            <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                        </svg>
                    </div>
                    <h3>名单</h3>
                    <p>人员/人才/获奖筛选查询</p>
                </div>
            </div>
        </div>
    </section>

    <!-- 底部信息 -->
    <footer class="footer">
        <div class="container">
            <p>北京大学学院看板移动端 © 2026</p>
            <p class="footer-sub">数据更新于每日05:00</p>
        </div>
    </footer>
</body>
</html>
